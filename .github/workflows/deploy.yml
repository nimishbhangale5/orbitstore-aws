name: 🔄 OrbitStore CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: orbitstore-api
  LAMBDA_FUNCTION: orbitstore-api-dev
  S3_BUCKET: orbitstore-website-dev

jobs:

  # ══════════════════════════════
  # STAGE 1 — TEST
  # ══════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: ✅ Checkout Code
      uses: actions/checkout@v4

    - name: 🐍 Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install Dependencies
      run: |
        pip install boto3 pytest
        echo "✅ Dependencies installed"

    - name: 🧪 Run Tests
      run: |
        cd backend
        pytest tests/ -v
      env:
        AWS_DEFAULT_REGION: us-east-1

  # ══════════════════════════════
  # STAGE 2 — BUILD & PUSH DOCKER
  # ══════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
    - name: ✅ Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region:            ${{ env.AWS_REGION }}

    - name: 🔐 Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: 🔨 Build & Push Docker Image
      id: build
      run: |
        IMAGE_TAG=${GITHUB_SHA::8}
        ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}

        echo "Building image with tag: $IMAGE_TAG"
        docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest ./backend

        echo "Pushing to ECR..."
        docker push $ECR_URI:$IMAGE_TAG
        docker push $ECR_URI:latest

        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "✅ Image pushed: $ECR_URI:$IMAGE_TAG"

  # ══════════════════════════════
  # STAGE 3 — DEPLOY
  # ══════════════════════════════
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: ✅ Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region:            ${{ env.AWS_REGION }}

    - name: ☁️ Deploy Frontend to S3
      run: |
        aws s3 sync frontend/ s3://${{ env.S3_BUCKET }}/ --delete
        echo "✅ Frontend deployed to S3"

    - name: ⚡ Update Lambda Function
      run: |
        zip -j lambda.zip backend/app.py
        aws lambda update-function-code \
          --function-name ${{ env.LAMBDA_FUNCTION }} \
          --zip-file fileb://lambda.zip
        echo "✅ Lambda updated"

    - name: 🎉 Print Live URLs
      run: |
        echo "🌐 Website: http://${{ env.S3_BUCKET }}.s3-website-us-east-1.amazonaws.com"
        echo "🔗 API: https://1ztdo1qmsl.execute-api.us-east-1.amazonaws.com/dev"
        echo "🐳 ECR: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest"